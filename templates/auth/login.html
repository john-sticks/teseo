{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema REF</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
</head>
<body class="ref-login-container">
    <div class="ref-login-logo">
        <img src="{% static 'images/REF-Logo.png' %}" alt="REF Logo">
    </div>
    
    <div class="ref-login-card">
        <h2 class="ref-login-title">Ingresá a tu cuenta</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="ref-alert ref-alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <i class="fas fa-info-circle"></i>
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% if form.errors %}
            <div class="ref-alert ref-alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>Error:</strong> Usuario o contraseña incorrectos.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <input type="text" 
                   class="ref-login-input" 
                   id="id_username" 
                   name="username" 
                   placeholder="Usuario"
                   required>
            
            <input type="password" 
                   class="ref-login-input" 
                   id="id_password" 
                   name="password" 
                   placeholder="Contraseña"
                   required>
            
            <button type="submit" class="ref-login-btn">
                Ingresar
            </button>
        </form>
    </div>
    
    <div class="ref-login-footer">
        © REF - Acceso interno
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Auto-focus en el campo de usuario
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('id_username').focus();
        });
        
        // Validación de formulario
        document.querySelector('form').addEventListener('submit', function(e) {
            const username = document.getElementById('id_username').value.trim();
            const password = document.getElementById('id_password').value.trim();
            
            if (!username || !password) {
                e.preventDefault();
                alert('Por favor, complete todos los campos');
                return false;
            }
            
            // Mostrar loading
            const btn = document.querySelector('.ref-login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ingresando...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
