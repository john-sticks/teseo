{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">Confirmar Eliminación</div>
    <div class="card-body">
        <p>¿Estás seguro de que quieres eliminar el usuario "{{ user.username }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar</button>
            <a href="{% url 'dashboard:usuarios_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
