{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">{% if user %}Editar Usuario{% else %}Crear Usuario{% endif %}</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password (dejar en blanco para mantener actual)</label>
                <input type="password" class="form-control" id="password" name="password">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_superuser" name="is_superuser" {% if user.is_superuser %}checked{% endif %}>
                <label class="form-check-label" for="is_superuser">Superuser</label>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'dashboard:usuarios_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
